name: Agente Revisor Pri$ma

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: PR Agent Action
        uses: Codium-ai/pr-agent@main
        env:
          # Se você gerou a chave no Google AI Studio, use esta linha:
          GOOGLE_AI_STUDIO_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Configurações de comportamento
          PR_REVIWER.EXTRA_INSTRUCTIONS: "Você é um revisor sênior auxiliando no projeto Prisma (Pri$ma). Analise o diff da PR e foque em: 1. Boas práticas de Python (PEP 8). 2. Segurança em conexões Docker/MySQL. 3. Sugestões de melhoria para o sistema de finanças. Responda em Português com um tom prestativo e direto."
