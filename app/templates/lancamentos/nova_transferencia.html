{% extends "base.html" %}

{% block title %}Nova Transferência{% endblock %}
{% block page_title %}Lançar Transferência entre Contas{% endblock %}

{% block content %}
<div class="card max-w-2xl mx-auto">
  <form action="/lancamentos/transferir" method="post">
    <input type="hidden" name="tipo" value="4">
    
    <div class="form-group">
      <label class="form-label">Descrição</label>
      <input type="text" name="descricao" class="form-control" placeholder="Ex: Transferência entre contas" value="Transferência de saldo" required>
    </div>

    <div class="form-grid-2">
      <div class="form-group">
        <label class="form-label">Valor</label>
        <input type="text" name="valor" class="form-control" placeholder="0,00" onkeyup="formatCurrency(this)" required>
      </div>
      <div class="form-group">
        <label class="form-label">Data</label>
        <input type="date" name="data" class="form-control" value="{{ hoje }}" required>
      </div>
    </div>

    <div class="form-grid-2">
      <div class="form-group">
        <label class="form-label">Conta de Origem (Saída)</label>
        <select name="conta" class="form-control" required>
          {% for c in contas %}
          <option value="{{ c.conta_id }}">{{ c.nome_conta }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Conta de Destino (Entrada)</label>
        <select name="conta_destino" class="form-control" required>
          <option value="">Selecione o destino...</option>
          {% for c in contas %}
          <option value="{{ c.conta_id }}">{{ c.nome_conta }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <hr>

    <div class="flex justify-end gap-3">
      <a href="/dashboard" class="btn btn-ghost">Cancelar</a>
      <button type="submit" class="btn btn-primary">Realizar Transferência</button>
    </div>
  </form>
</div>
{% endblock %}
