<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — FinOrg</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-base);
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-brand {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 54px;
      height: 54px;
      background: linear-gradient(135deg, var(--accent), var(--info));
      border-radius: var(--radius-md);
      font-size: 24px;
      margin-bottom: 16px;
    }
    .login-header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .login-header p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-header">
      <div class="login-brand">💰</div>
      <h1>Bem-vindo ao FinOrg</h1>
      <p>Gerencie suas finanças com elegância</p>
    </div>

    {% if erro %}
    <div class="alert alert-danger" style="margin-bottom: 24px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ erro }}
    </div>
    {% endif %}

    <form action="/login" method="post">
      <div class="form-group">
        <label class="form-label" for="login">Usuário</label>
        <input type="text" id="login" name="login" class="form-control" placeholder="Seu usuário" required autofocus>
      </div>

      <div class="form-group" style="margin-bottom: 24px;">
        <label class="form-label" for="senha">Senha</label>
        <input type="password" id="senha" name="senha" class="form-control" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary w-full" style="padding: 12px; font-size: 15px;">
        Entrar no Sistema
      </button>
    </form>
  </div>

</body>
</html>
